groups:
  - name: application_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: (sum(rate(http_errors_total[5m])) / sum(rate(http_requests_total{route!='/metrics'}[5m]))) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) for 10+ minutes"
          runbook_url: "https://github.com/your-org/runbooks/blob/main/high-error-rate.md"
          jaeger_url: "http://localhost:16686/search?service=timesheet-app&tags={\"error\":\"true\"}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{route!='/metrics'}[5m])) by (le)) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }}s (threshold: 300ms) for 10+ minutes"
          runbook_url: "https://github.com/your-org/runbooks/blob/main/high-latency.md"
          jaeger_url: "http://localhost:16686/search?service=timesheet-app&minDuration=300ms"

      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job='node-app'}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% (threshold: 80%) for 5+ minutes"

      - alert: HighMemoryUsage
        expr: (nodejs_heap_size_used_bytes{job='node-app'} / nodejs_heap_size_total_bytes{job='node-app'}) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% (threshold: 90%) for 5+ minutes"
